<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0f0f0f;
color:white;
display:flex;
min-height:100vh;
}

/* FUNDO */

@keyframes moveBackground {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body::before{
  content: "";
  background-image: url('img/fundoapp.jpg');
  background-size: cover;
  background-position: center;
  opacity: 0.15;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  animation: moveBackground 40s linear infinite;
}

/* MENU */

.sidebar{
width:230px;
padding:25px;
z-index:2;
background: transparent; /* Add a background to the sidebar */
}

.logo{
font-size:22px;
color:#ff8c00;
margin-bottom:35px;
font-weight:bold;
}

.menu-item{
padding:14px;
margin-bottom:12px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.menu-item:hover{
background:#ff8c00;
transform:scale(1.05);
}

/* CONTEÚDO */

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;
}

/* MOBILE */

.hamburger-menu {
    display: none;
    cursor: pointer;
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
}

.hamburger-menu span {
    display: block;
    width: 33px;
    height: 4px;
    margin-bottom: 5px;
    position: relative;
    background: #cdcdcd;
    border-radius: 3px;
    z-index: 1;
    transform-origin: 4px 0px;
    transition: transform 0.5s cubic-bezier(0.77,0.2,0.05,1.0),
                background 0.5s cubic-bezier(0.77,0.2,0.05,1.0),
                opacity 0.55s ease;
}

@media(max-width:800px){
    .sidebar{
        position: fixed;
        left: -250px; /* It was -250px before, but the width is 230px + 25px padding = 255px. So -250px is ok */
        height: 100%;
        transition: left 0.3s ease;
    }

    .sidebar.active {
        left: 0;
    }

    .hamburger-menu {
        display: block;
    }

    .main {
        width: 100%;
    }
}
</style>
<div class="sidebar">
    <div class="logo">🍔 EstoquePro</div>
    <div class="menu-item" onclick="window.location.href='dashboard.html'">🏠 Dashboard</div>
    <div class="menu-item" onclick="window.location.href='produtos.html'">📦 Produtos</div>
    <div class="menu-item" onclick="window.location.href='compras.html'">🛒 Compras</div>
    <div class="menu-item" onclick="window.location.href='estoque.html'">📊 Estoque</div>
    <div class="menu-item" onclick="window.location.href='relatorios.html'">📑 Relatórios</div>
    <div class="menu-item" onclick="logout()">🚪 Sair</div>
</div>
<div class="hamburger-menu">
    <span></span>
    <span></span>
    <span></span>
</div>
<script>
    document.querySelector('.hamburger-menu').addEventListener('click', function() {
        document.querySelector('.sidebar').classList.toggle('active');
    });

    // Close the menu if clicking outside of it
    document.addEventListener('click', function(event) {
        var isClickInside = document.querySelector('.sidebar').contains(event.target);
        var isHamburger = document.querySelector('.hamburger-menu').contains(event.target);

        if (!isClickInside && !isHamburger) {
            document.querySelector('.sidebar').classList.remove('active');
        }
    });
</script>
