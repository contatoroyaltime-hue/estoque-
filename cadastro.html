<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Criar Conta</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
overflow:hidden;
}

/* FUNDO COM COMIDAS */

@keyframes moveBackground {
  0% { transform: translate(0, 0) rotate(-25deg); }
  50% { transform: translate(-20px, 20px) rotate(-25deg); }
  100% { transform: translate(0, 0) rotate(-25deg); }
}

body::before{
content:"🍔 🍕 🍟 🌮 🍗 🍩 🍺";
font-size:70px;
opacity:0.05;
position:fixed;
z-index: -1;
width:200%;
height:200%;
line-height:120px;
letter-spacing:40px;
animation: moveBackground 15s linear infinite;
}

/* CARD */

.container{

background:rgba(255,255,255,0.05);

backdrop-filter:blur(12px);

padding:40px;

width:380px;

border-radius:18px;

box-shadow:0 0 40px rgba(0,0,0,0.6);

color:white;

text-align:center;

z-index:1;

}

h1{
color:#ff8c00;
margin-bottom:20px;
}

input{

width:100%;
padding:14px;

margin-bottom:14px;

border:none;

border-radius:12px;

background:#1e1e1e;

color:white;

outline:none;

}

button{

width:100%;
padding:14px;

border:none;

border-radius:30px;

background:linear-gradient(45deg,#ff8c00,#ffb347);

font-weight:bold;

color:white;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 10px #ff8c00;

}

button:hover{

transform:scale(1.05);

box-shadow:
0 0 15px #ff8c00,
0 0 30px #ff8c00;

}

.link{
margin-top:10px;
font-size:13px;
color:#bbb;
cursor:pointer;
}

.link:hover{
color:white;
}

#mensagem{
margin-top:10px;
color:#ff4d4d;
}

@media(max-width:800px){
    .container {
        width: 100%;
        padding: 20px;
        border-radius: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>Criar Conta</h1>

<input type="text" id="nome" placeholder="Nome do restaurante">

<input type="text" id="telefone" placeholder="Telefone">

<input type="email" id="email" placeholder="Email">

<input type="password" id="senha" placeholder="Senha">

<input type="date" id="nascimento">

<button onclick="criarConta()">Criar Conta</button>

<div class="link" onclick="window.location.href='login.html'">
Já tenho conta
</div>

<p id="mensagem"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
authDomain: "controle-de-estoque-fac87.firebaseapp.com",
projectId: "controle-de-estoque-fac87",
storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
messagingSenderId: "931385340836",
appId: "1:931385340836:web:ed3cb1d560127b739b8731"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.criarConta = async function(){

let nome = document.getElementById("nome").value;
let telefone = document.getElementById("telefone").value;
let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;
let nascimento = document.getElementById("nascimento").value;

try{

const userCredential = await createUserWithEmailAndPassword(auth,email,senha);

const user = userCredential.user;

await setDoc(doc(db,"restaurantes",user.uid),{

nome:nome,
telefone:telefone,
email:email,
nascimento:nascimento

});

alert("Conta criada com sucesso!");

window.location.href="index.html";

}

catch(error){

document.getElementById("mensagem").innerText=error.message;

}

}

</script>

</body>
</html>
