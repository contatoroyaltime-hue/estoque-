<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Login - EstoquePro</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
overflow:hidden;
}

/* FUNDO COM COMIDAS */

@keyframes moveBackground {
  0% { transform: translate(0, 0) rotate(-25deg); }
  50% { transform: translate(-20px, 20px) rotate(-25deg); }
  100% { transform: translate(0, 0) rotate(-25deg); }
}

body::before{
content:"🍔 🍕 🍟 🌮 🍗 🍺";
font-size:70px;
opacity:0.05;
position:fixed;
z-index: -1;
width:200%;
height:200%;
line-height:120px;
letter-spacing:40px;
animation: moveBackground 15s linear infinite;
}

/* CARD */

.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:45px;
width:360px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
color:white;
text-align:center;
z-index:1;
}

h1{
color:#ff8c00;
margin-bottom:5px;
}

.sub{
font-size:14px;
color:#aaa;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1e1e1e;
color:white;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff8c00,#ffb347);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px #ff8c00;
}

button:hover{
transform:scale(1.05);
box-shadow:
0 0 15px #ff8c00,
0 0 30px #ff8c00;
}

.link{
margin-top:10px;
font-size:13px;
color:#bbb;
cursor:pointer;
}

.link:hover{
color:white;
}

#mensagem{
margin-top:10px;
color:#ff4d4d;
}

@media(max-width:800px){
    .container {
        width: 100%;
        padding: 20px;
        border-radius: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>EstoquePro</h1>
<p class="sub">Controle inteligente para restaurantes</p>

<input type="email" id="email" placeholder="Seu email">
<input type="password" id="senha" placeholder="Sua senha">

<button onclick="login()">Entrar</button>

<div class="link" onclick="window.location.href='cadastro.html'">
Criar conta
</div>

<div class="link" onclick="resetSenha()">
Esqueci minha senha
</div>

<p id="mensagem"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
authDomain: "controle-de-estoque-fac87.firebaseapp.com",
projectId: "controle-de-estoque-fac87",
storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
messagingSenderId: "931385340836",
appId: "1:931385340836:web:ed3cb1d560127b739b8731"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


/* LOGIN */

window.login = function(){

let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)

.then(()=>{
window.location.href="dashboard.html";
})

.catch(()=>{
document.getElementById("mensagem").innerText="Email ou senha inválidos";
});

}


/* RESET SENHA */

window.resetSenha = function(){

let email = document.getElementById("email").value;

sendPasswordResetEmail(auth,email)

.then(()=>{
alert("Email de recuperação enviado");
})

.catch(()=>{
document.getElementById("mensagem").innerText="Digite um email válido";
});

}


/* SE JÁ ESTIVER LOGADO */

onAuthStateChanged(auth,(user)=>{

if(user){
window.location.href="dashboard.html";
}

});

</script>

</body>

</html>
